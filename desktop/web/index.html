<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vāgmi - Secure Workspace</title>
  <link rel="icon" type="image/png" href="./assets/logo_dark.png" />
  <script src="./core/theme.js"></script>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./theme.css" />
</head>
<body>
  <div class="app-shell" id="app-shell">
    
    <aside class="sidebar" id="sidebar">
      
      <div class="sidebar-header">
        <img data-theme-logo="mark" src="./assets/logo_dark.png" alt="Vāgmi Logo" class="brand-logo" />
        <span class="brand-text">Vāgmi</span>
      </div>

      <nav class="sidebar-nav" aria-label="Primary navigation">
        <button class="nav-item active" data-page="home" title="Home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          <span class="nav-label">Home</span>
        </button>

        <button class="nav-item" data-page="intelligence" title="Intelligence">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
          <span class="nav-label">Intelligence</span>
        </button>

        <button class="nav-item" data-page="diagram" title="Diagram Studio">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="7" height="6" rx="1"></rect><rect x="14" y="4" width="7" height="6" rx="1"></rect><rect x="8" y="14" width="8" height="6" rx="1"></rect><path d="M10 7h4"></path><path d="M8 17h8"></path><path d="M6 10v4h12v-4"></path></svg>
          <span class="nav-label">Diagram Studio</span>
        </button>

        <button class="nav-item" data-page="chat" title="Chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <span class="nav-label">Chat</span>
          <span class="nav-notification-dot hidden" id="chat-nav-dot" aria-hidden="true"></span>
        </button>

        <button class="nav-item" data-page="settings" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          <span class="nav-label">Settings</span>
        </button>
        <button class="nav-item hidden" id="admin-nav-item" data-page="admin" title="Administration">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          <span class="nav-label">Admin</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-card">
          <div class="user-avatar" id="sidebar-user-avatar">
            <span class="user-avatar-initials" id="sidebar-user-initials">AM</span>
            <img id="sidebar-user-avatar-image" class="user-avatar-image hidden" alt="" />
          </div>
          <div class="user-details">
            <span class="user-name" id="username-display">User</span>
          </div>
          <button class="logout-btn" id="logout-btn" title="Logout" aria-label="Logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 17l5-5-5-5"></path><path d="M15 12H3"></path><path d="M21 3v18"></path></svg>
          </button>
        </div>
        
        <button class="workspace-mini-btn" id="workspace-mini-btn" title="Minimize to floating dock · Ctrl+Shift+M" aria-label="Minimize to floating dock" aria-pressed="false">
          <span class="workspace-mini-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"></rect><path d="M7 16h10"></path></svg>
          </span>
          <span class="workspace-mini-title">Minimize</span>
          <span class="workspace-mini-shortcut mono">⌘⇧M</span>
        </button>

        <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle Sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>
          <span class="toggle-label">Collapse</span>
        </button>
      </div>
    </aside>

    <main class="workspace">
      <iframe id="page-frame" class="page-frame" title="Vāgmi workspace" src="./pages/home/index.html"></iframe>
    </main>

  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>
